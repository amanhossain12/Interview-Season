spring:
  datasource:
    url: jdbc:h2:mem:interviewai;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: placeholder
            client-secret: placeholder

  mail:
    host: localhost
    port: 1025
    username: test@test.com
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  frontend-url: http://localhost:3001
  backend-url: http://localhost:8080
  email-verification-expiry-hours: 24
  password-reset-expiry-hours: 2

openai:
  api-key: placeholder

judge0:
  api-key: placeholder

logging:
  level:
    com.interviewai: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: ERROR
