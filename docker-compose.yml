version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: interviewai-postgres
    environment:
      POSTGRES_DB: interviewai
      POSTGRES_USER: interviewai
      POSTGRES_PASSWORD: interviewai_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interviewai"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interviewai-backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/interviewai
      DB_USERNAME: interviewai
      DB_PASSWORD: interviewai_secret
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-256-bit-secret-key}
      JWT_EXPIRY_MS: 900000
      JWT_REFRESH_EXPIRY_MS: 604800000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      JUDGE0_API_KEY: ${JUDGE0_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: interviewai-adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
